<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumCalc Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222f;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent3: #c084fc;
    --cyan: #06b6d4;
    --green: #10b981;
    --orange: #f59e0b;
    --red: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --border: rgba(124,58,237,0.2);
    --border2: rgba(124,58,237,0.4);
    --glow: 0 0 20px rgba(124,58,237,0.4);
    --glow2: 0 0 40px rgba(124,58,237,0.6);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── ANIMATED BG ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: grid-drift 20s linear infinite;
  }
  @keyframes grid-drift {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  .bg-orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); z-index: 0; pointer-events: none;
  }
  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
    top: -100px; left: -100px;
    animation: orb-float1 12s ease-in-out infinite;
  }
  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.1), transparent 70%);
    bottom: -80px; right: -80px;
    animation: orb-float2 15s ease-in-out infinite;
  }
  .orb3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(168,85,247,0.08), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: orb-pulse 8s ease-in-out infinite;
  }
  @keyframes orb-float1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,30px) scale(1.1); }
    66% { transform: translate(-20px,50px) scale(0.95); }
  }
  @keyframes orb-float2 {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(-50px,-30px); }
  }
  @keyframes orb-pulse {
    0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
  }

  /* ── FLOATING PARTICLES ── */
  .particle {
    position: fixed; border-radius: 50%;
    background: var(--accent2); pointer-events: none; z-index: 0;
    animation: particle-float linear infinite;
  }
  @keyframes particle-float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ── MAIN LAYOUT ── */
  .app {
    position: relative; z-index: 10;
    display: grid;
    grid-template-columns: 380px 420px;
    gap: 20px;
    padding: 24px;
    max-width: 840px;
    width: 100%;
    animation: app-enter 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes app-enter {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── CALCULATOR PANEL ── */
  .calc-panel {
    background: linear-gradient(145deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; gap: 16px;
    position: relative; overflow: hidden;
  }
  .calc-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    animation: scan-line 3s ease-in-out infinite;
  }
  @keyframes scan-line {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ── HEADER ── */
  .calc-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .calc-brand {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent3);
    animation: brand-glow 3s ease-in-out infinite alternate;
  }
  @keyframes brand-glow {
    from { text-shadow: 0 0 8px rgba(192,132,252,0.5); }
    to { text-shadow: 0 0 20px rgba(192,132,252,1); }
  }
  .mode-tabs {
    display: flex; gap: 4px;
    background: var(--bg4); border-radius: 8px; padding: 3px;
  }
  .mode-tab {
    padding: 4px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 700; letter-spacing: 0.5px; cursor: pointer;
    transition: all 0.2s ease; color: var(--text3);
    font-family: 'Syne', sans-serif;
  }
  .mode-tab.active {
    background: var(--accent); color: white;
    box-shadow: 0 0 12px rgba(124,58,237,0.5);
  }

  /* ── DISPLAY ── */
  .display-wrap {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    position: relative; overflow: hidden;
    min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .display-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.03), transparent);
    pointer-events: none;
  }
  .display-expression {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text3);
    min-height: 18px; word-break: break-all;
    transition: all 0.2s ease;
    line-height: 1.4;
  }
  .display-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: 38px; font-weight: 700;
    color: var(--text); text-align: right;
    letter-spacing: -1px; word-break: break-all;
    transition: all 0.15s ease;
    line-height: 1.1; margin-top: 6px;
  }
  .display-main.animate-result {
    animation: result-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes result-pop {
    0% { transform: scale(0.9); color: var(--accent3); }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); color: var(--text); }
  }
  .display-cursor {
    display: inline-block; width: 2px; height: 32px;
    background: var(--accent2); margin-left: 2px;
    animation: cursor-blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes cursor-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── MEMORY ROW ── */
  .memory-row {
    display: flex; gap: 6px;
  }
  .mem-btn {
    flex: 1; padding: 6px 4px; border-radius: 7px;
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text2); font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease;
    font-family: 'Syne', sans-serif; letter-spacing: 0.5px;
  }
  .mem-btn:hover { background: rgba(124,58,237,0.2); color: var(--accent3); border-color: var(--border2); }
  .mem-btn:active { transform: scale(0.95); }

  /* ── BUTTONS GRID ── */
  .btn-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn-grid.sci-grid { grid-template-columns: repeat(5, 1fr); }

  .calc-btn {
    padding: 0; height: 58px;
    border-radius: var(--radius-sm); border: 1px solid transparent;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 500;
    transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .calc-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1), transparent 60%);
    opacity: 0; transition: opacity 0.2s;
  }
  .calc-btn:hover::before { opacity: 1; }
  .calc-btn::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: rgba(255,255,255,0.15);
    transform: scale(0); opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .calc-btn.ripple::after {
    animation: ripple-effect 0.4s ease-out;
  }
  @keyframes ripple-effect {
    0% { transform: scale(0); opacity: 0.5; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .calc-btn:hover { transform: translateY(-2px) scale(1.03); }
  .calc-btn:active { transform: scale(0.95); }

  /* Button types */
  .btn-num {
    background: var(--bg3); border-color: rgba(255,255,255,0.06);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .btn-num:hover { background: var(--bg4); border-color: rgba(124,58,237,0.3); box-shadow: var(--glow); }

  .btn-op {
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(124,58,237,0.1));
    border-color: var(--border2); color: var(--accent3);
    box-shadow: 0 2px 12px rgba(124,58,237,0.2);
  }
  .btn-op:hover { background: linear-gradient(135deg, rgba(124,58,237,0.45), rgba(124,58,237,0.25)); box-shadow: var(--glow2); }

  .btn-eq {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: var(--accent2); color: white;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    font-size: 22px;
  }
  .btn-eq:hover { box-shadow: 0 6px 30px rgba(124,58,237,0.8); filter: brightness(1.1); }

  .btn-clear {
    background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.08));
    border-color: rgba(239,68,68,0.3); color: #f87171;
  }
  .btn-clear:hover { background: linear-gradient(135deg, rgba(239,68,68,0.4), rgba(239,68,68,0.2)); box-shadow: 0 0 20px rgba(239,68,68,0.4); }

  .btn-fn {
    background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(6,182,212,0.05));
    border-color: rgba(6,182,212,0.25); color: var(--cyan);
    font-size: 12px; letter-spacing: -0.3px;
  }
  .btn-fn:hover { background: linear-gradient(135deg, rgba(6,182,212,0.3), rgba(6,182,212,0.15)); box-shadow: 0 0 20px rgba(6,182,212,0.3); }

  .btn-zero { grid-column: span 2; }

  /* ── LOG PANEL ── */
  .log-panel {
    background: linear-gradient(145deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; gap: 16px;
    position: relative; overflow: hidden;
  }
  .log-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan-line2 4s ease-in-out infinite 1s;
  }
  @keyframes scan-line2 {
    0%,100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  .log-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .log-title {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--cyan);
    display: flex; align-items: center; gap: 8px;
  }
  .log-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: log-blink 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }
  @keyframes log-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .log-clear-btn {
    padding: 5px 12px; border-radius: 8px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    color: #f87171; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease;
    font-family: 'Syne', sans-serif; letter-spacing: 0.5px;
  }
  .log-clear-btn:hover { background: rgba(239,68,68,0.25); box-shadow: 0 0 12px rgba(239,68,68,0.3); }

  /* ── LOG STATS BAR ── */
  .log-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .log-stat {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; text-align: center;
    transition: all 0.3s ease;
  }
  .log-stat:hover { border-color: var(--border2); box-shadow: var(--glow); }
  .log-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent3);
    display: block;
  }
  .log-stat-lbl { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; }

  /* ── LOG ENTRIES ── */
  .log-scroll {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
    max-height: 420px;
    padding-right: 4px;
  }
  .log-scroll::-webkit-scrollbar { width: 4px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  .log-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; gap: 12px;
    animation: pulse-empty 3s ease-in-out infinite;
  }
  @keyframes pulse-empty { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .log-empty-icon { font-size: 48px; filter: grayscale(1); }
  .log-empty-text { font-size: 13px; color: var(--text3); text-align: center; line-height: 1.6; }

  .log-entry {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    transition: all 0.2s ease; cursor: pointer;
    animation: entry-slide 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  @keyframes entry-slide {
    from { opacity: 0; transform: translateX(20px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  .log-entry::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .log-entry.type-calc::before { background: var(--accent2); }
  .log-entry.type-sci::before { background: var(--cyan); }
  .log-entry.type-mem::before { background: var(--green); }
  .log-entry.type-err::before { background: var(--red); }

  .log-entry:hover { border-color: var(--border2); box-shadow: var(--glow); transform: translateX(-2px); }

  .log-entry-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    margin-bottom: 4px;
  }
  .log-entry-expr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text2);
    word-break: break-all; flex: 1; line-height: 1.4;
  }
  .log-entry-time {
    font-size: 10px; color: var(--text3); white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }
  .log-entry-result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700; color: var(--text);
    line-height: 1;
  }
  .log-entry-result.positive { color: var(--green); }
  .log-entry-result.negative { color: #f87171; }
  .log-entry-result.error { color: var(--red); font-size: 14px; }
  .log-entry-meta {
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
  }
  .log-tag {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 4px;
  }
  .tag-calc { background: rgba(124,58,237,0.2); color: var(--accent3); }
  .tag-sci { background: rgba(6,182,212,0.15); color: var(--cyan); }
  .tag-mem { background: rgba(16,185,129,0.15); color: var(--green); }
  .tag-err { background: rgba(239,68,68,0.15); color: #f87171; }

  /* ── SCIENTIFIC MODE ── */
  #sci-panel { display: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 50px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; color: var(--text);
    box-shadow: var(--glow); z-index: 1000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; max-width: 420px; }
    .log-scroll { max-height: 300px; }
  }
</style>
</head>
<body>

<!-- BG FX -->
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<!-- PARTICLES -->
<div id="particles-container"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP -->
<div class="app">

  <!-- ══════════ CALCULATOR ══════════ -->
  <div class="calc-panel">
    <div class="calc-header">
      <div class="calc-brand">QuantumCalc</div>
      <div class="mode-tabs">
        <div class="mode-tab active" id="tab-basic" onclick="switchMode('basic')">BASIC</div>
        <div class="mode-tab" id="tab-sci" onclick="switchMode('sci')">SCI</div>
      </div>
    </div>

    <!-- DISPLAY -->
    <div class="display-wrap">
      <div class="display-expression" id="disp-expr"></div>
      <div class="display-main" id="disp-main">0<span class="display-cursor"></span></div>
    </div>

    <!-- MEMORY -->
    <div class="memory-row">
      <button class="mem-btn" onclick="memClear()">MC</button>
      <button class="mem-btn" onclick="memRecall()">MR</button>
      <button class="mem-btn" onclick="memAdd()">M+</button>
      <button class="mem-btn" onclick="memSub()">M−</button>
      <button class="mem-btn" onclick="memStore()">MS</button>
    </div>

    <!-- SCIENTIFIC PANEL -->
    <div id="sci-panel">
      <div class="btn-grid sci-grid">
        <button class="calc-btn btn-fn" onclick="pressSci('sin(')">sin</button>
        <button class="calc-btn btn-fn" onclick="pressSci('cos(')">cos</button>
        <button class="calc-btn btn-fn" onclick="pressSci('tan(')">tan</button>
        <button class="calc-btn btn-fn" onclick="pressSci('log(')">log</button>
        <button class="calc-btn btn-fn" onclick="pressSci('ln(')">ln</button>

        <button class="calc-btn btn-fn" onclick="pressSci('asin(')">sin⁻¹</button>
        <button class="calc-btn btn-fn" onclick="pressSci('acos(')">cos⁻¹</button>
        <button class="calc-btn btn-fn" onclick="pressSci('atan(')">tan⁻¹</button>
        <button class="calc-btn btn-fn" onclick="pressSci('sqrt(')">√</button>
        <button class="calc-btn btn-fn" onclick="pressSci('cbrt(')">∛</button>

        <button class="calc-btn btn-fn" onclick="pressSci('**2')">x²</button>
        <button class="calc-btn btn-fn" onclick="pressSci('**3')">x³</button>
        <button class="calc-btn btn-fn" onclick="pressSci('**')">xʸ</button>
        <button class="calc-btn btn-fn" onclick="pressSci('Math.PI')">π</button>
        <button class="calc-btn btn-fn" onclick="pressSci('Math.E')">e</button>

        <button class="calc-btn btn-fn" onclick="pressSci('abs(')">|x|</button>
        <button class="calc-btn btn-fn" onclick="pressFactorial()">n!</button>
        <button class="calc-btn btn-fn" onclick="pressSci('1/(')">1/x</button>
        <button class="calc-btn btn-fn" onclick="pressSci('floor(')">⌊x⌋</button>
        <button class="calc-btn btn-fn" onclick="pressSci('ceil(')">⌈x⌉</button>
      </div>
    </div>

    <!-- BASIC GRID -->
    <div class="btn-grid" id="basic-grid">
      <!-- Row 1 -->
      <button class="calc-btn btn-clear" onclick="pressBtn('AC')" style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">AC</button>
      <button class="calc-btn btn-clear" onclick="pressBtn('+/-')" style="font-family:'JetBrains Mono',monospace;font-size:18px">±</button>
      <button class="calc-btn btn-clear" onclick="pressBtn('%')" style="font-size:18px">%</button>
      <button class="calc-btn btn-op" onclick="pressBtn('/')">÷</button>

      <!-- Row 2 -->
      <button class="calc-btn btn-num" onclick="pressBtn('7')">7</button>
      <button class="calc-btn btn-num" onclick="pressBtn('8')">8</button>
      <button class="calc-btn btn-num" onclick="pressBtn('9')">9</button>
      <button class="calc-btn btn-op" onclick="pressBtn('*')">×</button>

      <!-- Row 3 -->
      <button class="calc-btn btn-num" onclick="pressBtn('4')">4</button>
      <button class="calc-btn btn-num" onclick="pressBtn('5')">5</button>
      <button class="calc-btn btn-num" onclick="pressBtn('6')">6</button>
      <button class="calc-btn btn-op" onclick="pressBtn('-')">−</button>

      <!-- Row 4 -->
      <button class="calc-btn btn-num" onclick="pressBtn('1')">1</button>
      <button class="calc-btn btn-num" onclick="pressBtn('2')">2</button>
      <button class="calc-btn btn-num" onclick="pressBtn('3')">3</button>
      <button class="calc-btn btn-op" onclick="pressBtn('+')">+</button>

      <!-- Row 5 -->
      <button class="calc-btn btn-num btn-zero" onclick="pressBtn('0')">0</button>
      <button class="calc-btn btn-num" onclick="pressBtn('.')">.</button>
      <button class="calc-btn btn-eq" onclick="pressBtn('=')">=</button>
    </div>

    <!-- BACKSPACE -->
    <button class="calc-btn btn-op" style="width:100%;height:44px;font-size:20px;border-radius:var(--radius-sm)" onclick="pressBtn('DEL')">⌫</button>
  </div>

  <!-- ══════════ LOG PANEL ══════════ -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-title">
        <div class="log-dot"></div>
        CALC LOG
      </div>
      <button class="log-clear-btn" onclick="clearLog()">CLEAR ALL</button>
    </div>

    <!-- STATS -->
    <div class="log-stats">
      <div class="log-stat">
        <span class="log-stat-val" id="stat-total">0</span>
        <div class="log-stat-lbl">TOTAL OPS</div>
      </div>
      <div class="log-stat">
        <span class="log-stat-val" id="stat-last" style="font-size:13px;color:var(--green)">—</span>
        <div class="log-stat-lbl">LAST RESULT</div>
      </div>
      <div class="log-stat">
        <span class="log-stat-val" id="stat-session" style="color:var(--cyan)">0s</span>
        <div class="log-stat-lbl">SESSION</div>
      </div>
    </div>

    <!-- ENTRIES -->
    <div class="log-scroll" id="log-scroll">
      <div class="log-empty" id="log-empty">
        <div class="log-empty-icon">🧮</div>
        <div class="log-empty-text">No calculations yet.<br>Start computing to see your history here.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── STATE ──
let expression = '';
let displayValue = '0';
let justEvaluated = false;
let memory = 0;
let logEntries = [];
let mode = 'basic';
let sessionStart = Date.now();
let opCount = 0;

// ── PARTICLES ──
(function(){
  const c = document.getElementById('particles-container');
  for(let i = 0; i < 25; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1 + Math.random() * 3;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}vw;
      animation-duration:${8+Math.random()*20}s;
      animation-delay:${Math.random()*15}s;
      opacity:${0.3+Math.random()*0.5};
    `;
    c.appendChild(p);
  }
})();

// ── SESSION TIMER ──
setInterval(() => {
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  if(s < 60) document.getElementById('stat-session').textContent = s + 's';
  else document.getElementById('stat-session').textContent = Math.floor(s/60) + 'm';
}, 1000);

// ── DISPLAY UPDATE ──
function updateDisplay(val, expr) {
  const dm = document.getElementById('disp-main');
  const de = document.getElementById('disp-expr');
  if(val !== undefined) displayValue = val;
  if(expr !== undefined) de.textContent = expr || '';
  dm.innerHTML = displayValue + '<span class="display-cursor"></span>';
}

// ── MODE SWITCH ──
function switchMode(m) {
  mode = m;
  document.getElementById('tab-basic').classList.toggle('active', m === 'basic');
  document.getElementById('tab-sci').classList.toggle('active', m === 'sci');
  document.getElementById('sci-panel').style.display = m === 'sci' ? 'block' : 'none';
  showToast(m === 'sci' ? '🔬 Scientific Mode' : '🔢 Basic Mode');
}

// ── BUTTON PRESS ──
function pressBtn(key) {
  triggerRipple(event);

  if(key === 'AC') {
    expression = '';
    updateDisplay('0', '');
    justEvaluated = false;
    return;
  }
  if(key === 'DEL') {
    if(justEvaluated) { expression = ''; updateDisplay('0',''); justEvaluated=false; return; }
    expression = expression.slice(0, -1);
    updateDisplay(expression || '0', '');
    return;
  }
  if(key === '+/-') {
    if(displayValue.startsWith('-')) {
      displayValue = displayValue.slice(1);
    } else {
      displayValue = '-' + displayValue;
    }
    if(justEvaluated) expression = displayValue;
    else {
      const match = expression.match(/(-?\d*\.?\d+)$/);
      if(match) expression = expression.slice(0, -match[0].length) + displayValue;
      else expression = displayValue;
    }
    updateDisplay(displayValue, '');
    return;
  }
  if(key === '%') {
    try {
      const val = parseFloat(displayValue) / 100;
      expression = String(val);
      updateDisplay(formatNum(val), '');
    } catch(e){}
    return;
  }
  if(key === '=') {
    evaluate();
    return;
  }

  if(justEvaluated && /[\d.]/.test(key)) {
    expression = '';
    justEvaluated = false;
  }

  if(key === '.' && /\.\d*$/.test(expression.split(/[\+\-\*\/]/).pop())) return;

  expression += key;
  updateDisplay(expression, '');
}

// ── SCIENTIFIC PRESS ──
function pressSci(fn) {
  triggerRipple(event);
  if(justEvaluated) { justEvaluated = false; }
  expression += fn;
  updateDisplay(expression, '');
}

// ── FACTORIAL ──
function pressFactorial() {
  triggerRipple(event);
  try {
    let n = parseInt(displayValue);
    if(n < 0 || n > 170) { showToast('⚠️ Out of range for factorial'); return; }
    let result = 1;
    for(let i = 2; i <= n; i++) result *= i;
    addLog(displayValue + '!', result, 'sci');
    updateDisplay(formatNum(result), displayValue + '! =');
    expression = String(result);
    justEvaluated = true;
  } catch(e) { showError('Invalid input'); }
}

// ── EVALUATE ──
function evaluate() {
  if(!expression) return;
  const rawExpr = expression;
  try {
    // Replace friendly tokens
    let safe = expression
      .replace(/sin\(/g, 'Math.sin(')
      .replace(/cos\(/g, 'Math.cos(')
      .replace(/tan\(/g, 'Math.tan(')
      .replace(/asin\(/g, 'Math.asin(')
      .replace(/acos\(/g, 'Math.acos(')
      .replace(/atan\(/g, 'Math.atan(')
      .replace(/log\(/g, 'Math.log10(')
      .replace(/ln\(/g, 'Math.log(')
      .replace(/sqrt\(/g, 'Math.sqrt(')
      .replace(/cbrt\(/g, 'Math.cbrt(')
      .replace(/abs\(/g, 'Math.abs(')
      .replace(/floor\(/g, 'Math.floor(')
      .replace(/ceil\(/g, 'Math.ceil(');

    // Balance parentheses
    const opens = (safe.match(/\(/g)||[]).length;
    const closes = (safe.match(/\)/g)||[]).length;
    safe += ')'.repeat(Math.max(0, opens - closes));

    // eslint-disable-next-line no-new-func
    const result = Function('"use strict"; return (' + safe + ')')();

    if(!isFinite(result)) throw new Error('Division by zero or overflow');
    if(isNaN(result)) throw new Error('Not a number');

    const formatted = formatNum(result);
    const type = mode === 'sci' ? 'sci' : 'calc';
    addLog(rawExpr, result, type);
    updateDisplay(formatted, rawExpr + ' =');
    expression = String(result);
    justEvaluated = true;

    // Animate
    const dm = document.getElementById('disp-main');
    dm.classList.remove('animate-result');
    void dm.offsetWidth;
    dm.classList.add('animate-result');
    setTimeout(() => dm.classList.remove('animate-result'), 500);

  } catch(e) {
    addLog(rawExpr, e.message, 'err');
    showError(e.message.includes('zero') ? '÷ by Zero' : 'Error');
    expression = '';
    justEvaluated = false;
  }
}

// ── FORMAT NUMBER ──
function formatNum(n) {
  if(Math.abs(n) >= 1e15 || (Math.abs(n) < 1e-10 && n !== 0)) {
    return n.toExponential(6);
  }
  const s = parseFloat(n.toFixed(10)).toString();
  return s;
}

// ── MEMORY ──
function memStore() { memory = parseFloat(displayValue)||0; showToast('💾 Stored: ' + formatNum(memory)); addLog('MS = ' + formatNum(memory), memory, 'mem'); }
function memRecall() { expression = String(memory); updateDisplay(formatNum(memory),'MR'); justEvaluated=true; showToast('📤 Recalled: ' + formatNum(memory)); }
function memAdd() { memory += parseFloat(displayValue)||0; showToast('➕ M = ' + formatNum(memory)); }
function memSub() { memory -= parseFloat(displayValue)||0; showToast('➖ M = ' + formatNum(memory)); }
function memClear() { memory = 0; showToast('🗑️ Memory cleared'); }

// ── ERROR ──
function showError(msg) {
  const dm = document.getElementById('disp-main');
  dm.innerHTML = '<span style="color:#f87171;font-size:22px">' + msg + '</span><span class="display-cursor"></span>';
  setTimeout(() => { updateDisplay('0',''); }, 1800);
}

// ── LOG ──
function addLog(expr, result, type) {
  opCount++;
  const entry = {
    id: Date.now() + Math.random(),
    expr, result, type,
    time: new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false})
  };
  logEntries.unshift(entry);
  if(logEntries.length > 100) logEntries.pop();
  renderLog();
  updateStats();
}

function renderLog() {
  const scroll = document.getElementById('log-scroll');
  const empty = document.getElementById('log-empty');

  if(logEntries.length === 0) {
    empty.style.display = 'flex';
    // Remove old entries
    scroll.querySelectorAll('.log-entry').forEach(e => e.remove());
    return;
  }
  empty.style.display = 'none';

  // Remove all entries and re-render (keep it simple)
  scroll.querySelectorAll('.log-entry').forEach(e => e.remove());

  logEntries.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = `log-entry type-${entry.type}`;
    div.style.animationDelay = i === 0 ? '0ms' : '999s'; // Only animate newest

    const isErr = entry.type === 'err';
    const resClass = isErr ? 'error' : (parseFloat(entry.result) < 0 ? 'negative' : 'positive');
    const resDisplay = isErr ? entry.result : formatNum(parseFloat(entry.result));

    const tagMap = { calc:'CALC', sci:'SCI', mem:'MEM', err:'ERR' };
    const tagClass = `tag-${entry.type}`;

    div.innerHTML = `
      <div class="log-entry-top">
        <div class="log-entry-expr">${escHtml(String(entry.expr))}</div>
        <div class="log-entry-time">${entry.time}</div>
      </div>
      <div class="log-entry-result ${resClass}">${escHtml(String(resDisplay))}</div>
      <div class="log-entry-meta">
        <div class="log-tag ${tagClass}">${tagMap[entry.type]}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      if(!isErr) {
        expression = String(entry.result);
        updateDisplay(formatNum(parseFloat(entry.result)), '← from log');
        justEvaluated = true;
        showToast('📋 Loaded from log');
      }
    });
    scroll.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  document.getElementById('stat-total').textContent = opCount;
  const lastCalc = logEntries.find(e => e.type !== 'err' && e.type !== 'mem');
  if(lastCalc) {
    const v = formatNum(parseFloat(lastCalc.result));
    const el = document.getElementById('stat-last');
    el.textContent = v.length > 8 ? v.slice(0,8)+'…' : v;
    el.style.color = parseFloat(lastCalc.result) < 0 ? '#f87171' : 'var(--green)';
  }
}

function clearLog() {
  logEntries = [];
  opCount = 0;
  document.getElementById('stat-total').textContent = '0';
  document.getElementById('stat-last').textContent = '—';
  renderLog();
  showToast('🗑️ Log cleared');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── RIPPLE ──
function triggerRipple(e) {
  if(!e || !e.currentTarget) return;
  const btn = e.currentTarget;
  btn.classList.remove('ripple');
  void btn.offsetWidth;
  btn.classList.add('ripple');
  setTimeout(() => btn.classList.remove('ripple'), 400);
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  const k = e.key;
  if(k >= '0' && k <= '9') pressBtn(k);
  else if(k === '+') pressBtn('+');
  else if(k === '-') pressBtn('-');
  else if(k === '*') pressBtn('*');
  else if(k === '/') { e.preventDefault(); pressBtn('/'); }
  else if(k === '.') pressBtn('.');
  else if(k === '%') pressBtn('%');
  else if(k === 'Enter' || k === '=') pressBtn('=');
  else if(k === 'Backspace') pressBtn('DEL');
  else if(k === 'Escape') pressBtn('AC');
  else if(k === '(') pressSci('(');
  else if(k === ')') pressSci(')');
});
</script>
</body>
</html>
